<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developed By Subhan</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="login-logo">
                <div>
                    <h2>VOICECORD</h2>
                    <p class="sub">DISCORD TOKENS MANAGER</p>
                </div>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <div id="error-msg" class="error-msg"></div>
                <button type="submit" class="btn btn-login">Login Now</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');

            const formData = new FormData();
            formData.append('username', u);
            formData.append('password', p);

            try {
                const res = await fetch('/login', { method: 'POST', body: formData });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('vc_token', data.access_token);
                    window.location.href = '/';
                } else {
                    errorEl.innerText = 'Invalid username or password';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.innerText = 'Connection failed. Is the server running?';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
